---
layout: default
---
<!-- JSON-LD: BlogPosting -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ page.title | jsonify }},
  "url": "{{ page.url | absolute_url }}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Person",
    "name": "Gabriel Przybysz",
    "alternateName": "perxibes",
    "url": "{{ site.url }}{{ site.baseurl }}"
  },
  "publisher": {
    "@type": "Person",
    "name": "Gabriel Przybysz",
    "alternateName": "perxibes",
    "url": "{{ site.url }}{{ site.baseurl }}"
  }{% if page.description %},
  "description": {{ page.description | jsonify }}{% endif %}
}
</script>

<article class="post-article">
    <h1>{{ page.title }}</h1>
    
    <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">
            {{ page.date | date: "%b %d, %Y" }}
        </time>
        {% if page.tags %}
        <span style="opacity: 0.3;">·</span>
        <div class="post-tags">
            {% for tag in page.tags %}
            <a href="{{ '/tags' | relative_url }}#{{ tag | slugify }}" class="tag">{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </div>
    
    <div class="post-content">
        {{ content }}
    </div>

    <div class="post-author">
        <p>Written by <a href="{{ '/' | relative_url }}"><strong>Gabriel Przybysz</strong></a> (perxibes) — security engineer.</p>
    </div>
</article>
