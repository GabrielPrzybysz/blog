<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="icon" type="image/png" href="{{ '/assets/images/logo.png' | relative_url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a class="logo-url" href="{{ '/posts' | relative_url }}">
                    <img src="/assets/images/logo.png" alt="Perxibes" style="width: 32px; height: 32px;">
                    ~/blog
                </a>
            </div>
            <div class="nav-links">
                <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>about</a>
                <a href="{{ '/posts' | relative_url }}" {% if page.url == '/posts.html' or page.url contains '/post/' %}class="active"{% endif %}>posts</a>
                <a href="{{ '/tags' | relative_url }}" {% if page.url == '/tags.html' %}class="active"{% endif %}>tags</a>
            </div>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>{{ site.description }}</p>
    </footer>
</body>
</html>
