title: "perxibes — Gabriel Przybysz"
description: >
  perxibes is Gabriel Przybysz — security engineer writing about vulnerabilities, pentesting,
  infrastructure, and cybersecurity. Przybysz documents the hard-won lessons so you don't have to
  learn them the painful way. © 2026 — All rights reserved.
url: "https://perxibes.net"
baseurl: "/"
lang: en
author:
  name: "Gabriel Przybysz"
  handle: "perxibes"
  github: "https://github.com/GabrielPrzybysz"
  linkedin: "https://linkedin.com/in/gabriel-przybysz/"

safe: true 
disable_disk_cache: true
strict_front_matter: true

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    default_lang: text
  hard_wrap: false
  auto_ids: true
  entity_output: as_char
  smart_quotes: ["apos", "apos", "quot", "quot"]

plugins:
  - jekyll-feed
  - jekyll-sitemap

incremental: false
profile: false

collections:
  posts:
    output: true
    permalink: /post/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .git
  - .gitignore
  - vendor

include:
  - _pages
